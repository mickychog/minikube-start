apiVersion: apps/v1
kind: Deployment
metadata:
  name: hola-mundo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hola-mundo
  template:
    metadata:
      labels:
        app: hola-mundo
    spec:
      containers:
      - name: app
        image: hola-mundo:v1
        imagePullPolicy: IfNotPresent   
        ports:
        - containerPort: 3000